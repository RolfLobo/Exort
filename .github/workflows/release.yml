name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Typecheck
        run: npm run typecheck

      - name: Validate tag matches desktop package version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./packages/desktop/package.json').version")"

          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "Release tag $TAG does not match packages/desktop/package.json version v$VERSION." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: validate
    runs-on: windows-latest
    env:
      GYP_MSVS_VERSION: 2022
      npm_config_msvs_version: 2022
      CL: /std:c++20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install root Electron and Rollup native package
        shell: bash
        run: |
          ELECTRON_VERSION="$(node -p "require('./packages/desktop/package.json').devDependencies.electron")"
          ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').version")"
          npm install --no-save "electron@${ELECTRON_VERSION}" "@rollup/rollup-win32-x64-msvc@${ROLLUP_VERSION}"

      - name: Build desktop bundle
        run: npm --workspace @exort/desktop run build

      - name: Rebuild app native dependencies
        run: npm --workspace @exort/desktop run install-app-deps

      - name: Package desktop release artifacts
        run: npm --workspace @exort/desktop run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exort-windows-x64
          path: packages/desktop/release/*.exe
          if-no-files-found: error

  build-macos-arm64:
    needs: validate
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install root Electron and Rollup native package
        shell: bash
        run: |
          ELECTRON_VERSION="$(node -p "require('./packages/desktop/package.json').devDependencies.electron")"
          ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').version")"
          npm install --no-save "electron@${ELECTRON_VERSION}" "@rollup/rollup-darwin-arm64@${ROLLUP_VERSION}"

      - name: Build desktop bundle
        run: npm --workspace @exort/desktop run build

      - name: Rebuild app native dependencies
        run: npm --workspace @exort/desktop run install-app-deps

      - name: Prepare App Store Connect API key
        shell: bash
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Package desktop release artifacts
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm --workspace @exort/desktop run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exort-macos-arm64
          path: packages/desktop/release/*-mac-arm64.dmg
          if-no-files-found: error

  build-macos-x64:
    needs: validate
    runs-on: macos-15-intel
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install root Electron and Rollup native package
        shell: bash
        run: |
          ELECTRON_VERSION="$(node -p "require('./packages/desktop/package.json').devDependencies.electron")"
          ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').version")"
          npm install --no-save "electron@${ELECTRON_VERSION}" "@rollup/rollup-darwin-x64@${ROLLUP_VERSION}"

      - name: Build desktop bundle
        run: npm --workspace @exort/desktop run build

      - name: Rebuild app native dependencies
        run: npm --workspace @exort/desktop run install-app-deps

      - name: Prepare App Store Connect API key
        shell: bash
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Package desktop release artifacts
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm --workspace @exort/desktop run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exort-macos-x64
          path: packages/desktop/release/*-mac-x64.dmg
          if-no-files-found: error

  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install root Electron and Rollup native package
        shell: bash
        run: |
          ELECTRON_VERSION="$(node -p "require('./packages/desktop/package.json').devDependencies.electron")"
          ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').version")"
          npm install --no-save "electron@${ELECTRON_VERSION}" "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      - name: Build desktop bundle
        run: npm --workspace @exort/desktop run build

      - name: Rebuild app native dependencies
        run: npm --workspace @exort/desktop run install-app-deps

      - name: Package desktop release artifacts
        run: npm --workspace @exort/desktop run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exort-linux-x64
          path: packages/desktop/release/*.AppImage
          if-no-files-found: error

  release:
    needs:
      - validate
      - build-windows
      - build-macos-arm64
      - build-macos-x64
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: exort-*
          merge-multiple: true
          path: release-assets

      - name: Generate release checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum *.exe *.dmg *.AppImage > SHA256SUMS.txt

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Exort ${{ needs.validate.outputs.tag }}
          draft: true
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/SHA256SUMS.txt
