name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Typecheck
        run: npm run typecheck

      - name: Validate tag matches desktop package version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./packages/desktop/package.json').version")"

          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "Release tag $TAG does not match packages/desktop/package.json version v$VERSION." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Exort ${{ needs.validate.outputs.tag }}
          draft: true
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
          generate_release_notes: true
          overwrite_files: true

  build-windows:
    needs:
      - validate
      - create-release
    runs-on: windows-latest
    env:
      GYP_MSVS_VERSION: 2022
      npm_config_msvs_version: 2022
      CL: /std:c++20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install root Electron and Rollup native package
        shell: bash
        run: |
          ELECTRON_VERSION="$(node -p "require('./packages/desktop/package.json').devDependencies.electron")"
          ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').version")"
          npm install --no-save "electron@${ELECTRON_VERSION}" "@rollup/rollup-win32-x64-msvc@${ROLLUP_VERSION}"

      - name: Build desktop bundle
        run: npm --workspace @exort/desktop run build

      - name: Rebuild app native dependencies
        run: npm --workspace @exort/desktop run install-app-deps

      - name: Package desktop release artifacts
        run: npm --workspace @exort/desktop run package

      - name: Zip Windows installer executable
        shell: pwsh
        run: |
          $installer = Get-ChildItem "packages/desktop/release/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer .exe found in packages/desktop/release."
          }

          $zipPath = Join-Path $installer.DirectoryName ("{0}-installer.zip" -f $installer.BaseName)
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $installer.FullName -DestinationPath $zipPath

      - name: Upload Windows assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          draft: true
          overwrite_files: true
          files: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.zip
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest*.yml

  build-macos-arm64:
    needs:
      - validate
      - create-release
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install root Electron and Rollup native package
        shell: bash
        run: |
          ELECTRON_VERSION="$(node -p "require('./packages/desktop/package.json').devDependencies.electron")"
          ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').version")"
          npm install --no-save "electron@${ELECTRON_VERSION}" "@rollup/rollup-darwin-arm64@${ROLLUP_VERSION}"

      - name: Build desktop bundle
        run: npm --workspace @exort/desktop run build

      - name: Rebuild app native dependencies
        run: npm --workspace @exort/desktop run install-app-deps

      - name: Prepare App Store Connect API key
        shell: bash
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Package desktop release artifacts
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm --workspace @exort/desktop run package

      - name: Staple and validate macOS DMG
        shell: bash
        env:
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          DMGS=(packages/desktop/release/*-mac-arm64.dmg)
          if [[ ${#DMGS[@]} -ne 1 ]]; then
            echo "Expected exactly one arm64 DMG, found ${#DMGS[@]}." >&2
            ls -la packages/desktop/release >&2
            exit 1
          fi

          DMG_PATH="${DMGS[0]}"
          echo "Verifying signed DMG: $DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

          echo "Submitting DMG for notarization: $DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$APPLE_API_KEY" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          echo "Stapling DMG: $DMG_PATH"
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose "$DMG_PATH"

          MOUNT_POINT="$(mktemp -d /tmp/exort-dmg-arm64-XXXXXX)"
          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_POINT" -nobrowse -quiet
          trap 'hdiutil detach "$MOUNT_POINT" -quiet || true; rmdir "$MOUNT_POINT" || true' EXIT

          APP_PATH="$MOUNT_POINT/Exort.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected app bundle not found at $APP_PATH" >&2
            ls -la "$MOUNT_POINT" >&2
            exit 1
          fi

          CS_INFO="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)"
          echo "$CS_INFO"
          if ! echo "$CS_INFO" | grep -q "flags=.*runtime"; then
            echo "Expected hardened runtime flag on $APP_PATH." >&2
            exit 1
          fi

          ENTITLEMENTS="$(codesign -d --entitlements :- "$APP_PATH" 2>&1 || true)"
          if echo "$ENTITLEMENTS" | grep -q "com.apple.security.app-sandbox"; then
            echo "Unexpected app sandbox entitlement on $APP_PATH." >&2
            exit 1
          fi
          for KEY in \
            com.apple.security.cs.allow-jit \
            com.apple.security.cs.allow-unsigned-executable-memory \
            com.apple.security.cs.disable-library-validation
          do
            if ! echo "$ENTITLEMENTS" | grep -q "<key>$KEY</key>"; then
              echo "Expected entitlement missing on $APP_PATH: $KEY" >&2
              exit 1
            fi
          done

          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Upload macOS arm64 assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          draft: true
          overwrite_files: true
          files: |
            packages/desktop/release/*-mac-arm64.dmg
            packages/desktop/release/*-mac-arm64.zip
            packages/desktop/release/*-mac-arm64.zip.blockmap

      - name: Upload per-arch latest-mac.yml for merge
        uses: actions/upload-artifact@v4
        with:
          name: latest-yml-mac-arm64
          path: packages/desktop/release/latest-mac.yml
          if-no-files-found: error
          retention-days: 1

  build-macos-x64:
    needs:
      - validate
      - create-release
    runs-on: macos-15-intel
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install root Electron and Rollup native package
        shell: bash
        run: |
          ELECTRON_VERSION="$(node -p "require('./packages/desktop/package.json').devDependencies.electron")"
          ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').version")"
          npm install --no-save "electron@${ELECTRON_VERSION}" "@rollup/rollup-darwin-x64@${ROLLUP_VERSION}"

      - name: Build desktop bundle
        run: npm --workspace @exort/desktop run build

      - name: Rebuild app native dependencies
        run: npm --workspace @exort/desktop run install-app-deps

      - name: Prepare App Store Connect API key
        shell: bash
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Package desktop release artifacts
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm --workspace @exort/desktop run package

      - name: Staple and validate macOS DMG
        shell: bash
        env:
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          DMGS=(packages/desktop/release/*-mac-x64.dmg)
          if [[ ${#DMGS[@]} -ne 1 ]]; then
            echo "Expected exactly one x64 DMG, found ${#DMGS[@]}." >&2
            ls -la packages/desktop/release >&2
            exit 1
          fi

          DMG_PATH="${DMGS[0]}"
          echo "Verifying signed DMG: $DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

          echo "Submitting DMG for notarization: $DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$APPLE_API_KEY" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          echo "Stapling DMG: $DMG_PATH"
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose "$DMG_PATH"

          MOUNT_POINT="$(mktemp -d /tmp/exort-dmg-x64-XXXXXX)"
          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_POINT" -nobrowse -quiet
          trap 'hdiutil detach "$MOUNT_POINT" -quiet || true; rmdir "$MOUNT_POINT" || true' EXIT

          APP_PATH="$MOUNT_POINT/Exort.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected app bundle not found at $APP_PATH" >&2
            ls -la "$MOUNT_POINT" >&2
            exit 1
          fi

          CS_INFO="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)"
          echo "$CS_INFO"
          if ! echo "$CS_INFO" | grep -q "flags=.*runtime"; then
            echo "Expected hardened runtime flag on $APP_PATH." >&2
            exit 1
          fi

          ENTITLEMENTS="$(codesign -d --entitlements :- "$APP_PATH" 2>&1 || true)"
          if echo "$ENTITLEMENTS" | grep -q "com.apple.security.app-sandbox"; then
            echo "Unexpected app sandbox entitlement on $APP_PATH." >&2
            exit 1
          fi
          for KEY in \
            com.apple.security.cs.allow-jit \
            com.apple.security.cs.allow-unsigned-executable-memory \
            com.apple.security.cs.disable-library-validation
          do
            if ! echo "$ENTITLEMENTS" | grep -q "<key>$KEY</key>"; then
              echo "Expected entitlement missing on $APP_PATH: $KEY" >&2
              exit 1
            fi
          done

          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Upload macOS x64 assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          draft: true
          overwrite_files: true
          files: |
            packages/desktop/release/*-mac-x64.dmg
            packages/desktop/release/*-mac-x64.zip
            packages/desktop/release/*-mac-x64.zip.blockmap

      - name: Upload per-arch latest-mac.yml for merge
        uses: actions/upload-artifact@v4
        with:
          name: latest-yml-mac-x64
          path: packages/desktop/release/latest-mac.yml
          if-no-files-found: error
          retention-days: 1

  build-linux:
    needs:
      - validate
      - create-release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install root Electron and Rollup native package
        shell: bash
        run: |
          ELECTRON_VERSION="$(node -p "require('./packages/desktop/package.json').devDependencies.electron")"
          ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').version")"
          npm install --no-save "electron@${ELECTRON_VERSION}" "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      - name: Build desktop bundle
        run: npm --workspace @exort/desktop run build

      - name: Rebuild app native dependencies
        run: npm --workspace @exort/desktop run install-app-deps

      - name: Package desktop release artifacts
        run: npm --workspace @exort/desktop run package

      - name: Upload Linux assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          draft: true
          overwrite_files: true
          files: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.AppImage.zsync
            packages/desktop/release/latest-linux*.yml

  combine-macos-manifest:
    needs:
      - validate
      - create-release
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download per-arch latest-mac.yml
        uses: actions/download-artifact@v4
        with:
          pattern: latest-yml-mac-*
          path: mac-manifests

      - name: Merge latest-mac.yml
        env:
          LATEST_YML_DIR: ${{ github.workspace }}/mac-manifests
        run: node packages/desktop/scripts/finalize-latest-mac-yml.mjs

      - name: Upload merged latest-mac.yml to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          draft: true
          overwrite_files: true
          files: ${{ runner.temp }}/latest-mac.yml
